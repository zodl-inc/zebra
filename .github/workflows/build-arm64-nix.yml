# Reusable workflow: build the reproducible aarch64 (arm64) zebrad artifact with
# Nix, on a native arm64 runner, and push it as its own multi-arch image
# variant. StageX (used for amd64, see docker/Dockerfile.stagex) cannot target
# arm64: its stage0 bootstrap seed (hex0) is x86-only. Nix gives
# rebuild-reproducibility (pinned flake lock) instead — a deliberate,
# documented asymmetry vs the amd64 StageX full-source-bootstrap build.
#
# Validated 2026-06: builds a static-musl zebrad on aarch64-linux, bit-for-bit
# reproducible across two independent builds. See flake.nix for the recipe
# (clang 18 + libcxxStdenv + a cc-wrapper for rocksdb's missing <cstdint>
# include + a broad src filter for zebra's embedded data files + an
# lld/libc++ link).
name: Build arm64 (Nix)

on:
  workflow_call:
    inputs:
      image-name:
        description: "Image repo name (e.g. zebra)"
        required: false
        type: string
        default: zebra
      dockerhub-namespace:
        description: "Docker Hub namespace to push the arm64 variant to"
        required: false
        type: string
        default: ""
    secrets:
      dockerhub_username:
        required: false
      dockerhub_password:
        required: false
    outputs:
      image-digest:
        description: "Digest of the pushed arm64 image variant (empty if not pushed)"
        value: ${{ jobs.build-arm64.outputs.image_digest }}
      image-ref:
        description: "Repo ref of the pushed arm64 image variant"
        value: ${{ jobs.build-arm64.outputs.image_ref }}

permissions:
  contents: read
  id-token: write # SLSA provenance + (optional) AWS OIDC for cache reads

jobs:
  build-arm64:
    name: Build aarch64-musl via Nix
    runs-on: ubuntu-24.04-arm # native arm64; free for public repos
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
      image_ref: ${{ steps.push.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v17
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Build static aarch64-musl zebrad (reproducible)
        run: |
          nix build .#zebrad --print-build-logs
          test -x ./result/bin/zebrad
          file ./result/bin/zebrad | tee /tmp/zebrad-file.txt
          grep -q "aarch64" /tmp/zebrad-file.txt
          echo "arm64 zebrad sha256: $(sha256sum ./result/bin/zebrad)"

      - name: Stage the runtime artifact
        run: |
          mkdir -p build/runtime/linux-arm64
          install -m0755 ./result/bin/zebrad build/runtime/linux-arm64/zebrad

      - name: Set up Docker Buildx
        if: ${{ inputs.dockerhub-namespace != '' }}
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Enable containerd image store
        if: ${{ inputs.dockerhub-namespace != '' }}
        uses: depot/use-containerd-snapshotter-action@2e6f905d28e7ca519b216e2219d00545537e9f46 # v1.0.0

      # Bootstrap the buildx builder BEFORE `docker login`. The builder lazily
      # pulls `moby/buildkit:buildx-stable-1` from Docker Hub on first use; if a
      # push-only-token login ran first, BuildKit attaches that token to this
      # ANONYMOUS public pull and Docker Hub 401s. Bootstrapping here pulls it
      # anonymously, so the later login only scopes the actual push.
      - name: Bootstrap buildx builder (anonymous pull, before login)
        if: ${{ inputs.dockerhub-namespace != '' }}
        run: docker buildx inspect --bootstrap

      - name: Log in to Docker Hub (after buildkit bootstrap)
        if: ${{ inputs.dockerhub-namespace != '' }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: docker.io
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_password }}

      - name: Build + push the arm64 image variant (by digest)
        id: push
        if: ${{ inputs.dockerhub-namespace != '' }}
        env:
          NS: ${{ inputs.dockerhub-namespace }}
          IMG: ${{ inputs.image-name }}
        run: |
          set -Eeuo pipefail
          REPO="docker.io/${NS}/${IMG}"
          # Minimal scratch image around the static-musl binary.
          mkdir -p ctx && cp build/runtime/linux-arm64/zebrad ctx/zebrad
          cat > ctx/Dockerfile <<'DF'
          FROM scratch
          COPY zebrad /usr/local/bin/zebrad
          USER 1000:1000
          ENTRYPOINT ["/usr/local/bin/zebrad"]
          DF
          # Push by digest only (no tag) — the manifest job stitches amd64+arm64
          # into the real tags. rewrite-timestamp keeps it reproducible.
          docker buildx build --platform linux/arm64 \
            --provenance=false --sbom=false \
            --output "type=image,name=${REPO},push-by-digest=true,name-canonical=true,push=true,rewrite-timestamp=true" \
            --metadata-file /tmp/meta.json ctx
          DIGEST="$(jq -r '."containerimage.digest"' /tmp/meta.json)"
          if [ -z "${DIGEST}" ] || [ "${DIGEST}" = "null" ]; then
            echo "no digest produced by buildx" >&2
            cat /tmp/meta.json >&2 || true
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${REPO}" >> "$GITHUB_OUTPUT"
          echo "pushed arm64 variant ${REPO}@${DIGEST}"

      - name: Install Cosign
        if: ${{ steps.push.outputs.digest != '' }}
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
      - name: Install Syft
        if: ${{ steps.push.outputs.digest != '' }}
        uses: anchore/sbom-action/download-syft@8e94d75ddd33f69f691467e42275782e4bfefe84 # v0.20.9
      - name: Cosign sign + attest SBOM (arm64 variant, by digest)
        if: ${{ steps.push.outputs.digest != '' }}
        env:
          REF: ${{ steps.push.outputs.image_ref }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -Eeuo pipefail
          cosign sign --yes "${REF}@${DIGEST}"
          syft "${REF}@${DIGEST}" --platform linux/arm64 -o spdx-json > /tmp/arm64.sbom.spdx.json
          cosign attest --yes --type spdxjson --predicate /tmp/arm64.sbom.spdx.json "${REF}@${DIGEST}"

      - name: Upload arm64 runtime binary
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: zebrad-runtime-linux-arm64
          path: build/runtime/linux-arm64/zebrad
          if-no-files-found: error
